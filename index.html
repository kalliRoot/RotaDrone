<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Drone Rastro - Suave com Ângulo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
  <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;overflow:hidden}
    #map{height:100vh;width:100vw}
    .toolbar{
      position:absolute;
      top:10px;
      left:10px;
      background:white;
      padding:14px;
      border-radius:10px;
      box-shadow:0 3px 15px rgba(0,0,0,0.25);
      z-index:1000;
      display:flex;
      flex-direction:column;
      gap:7px;
      width:290px;
      max-height:95vh;
      overflow-y:auto;
      transition:all 0.3s ease;
    }
    .toolbar.minimized {
      width: auto;
      padding: 8px;
      max-height: none;
      overflow: visible;
    }
    .toolbar.minimized > *:not(#btnToggleToolbar) {
      display: none;
    }
    .toolbar.minimized #btnToggleToolbar {
      display: block;
      min-width: 160px;
      margin: 0;
    }
    .toolbar h3{text-align:center;font-size:15px;margin-bottom:2px}
    .toolbar button{padding:9px 12px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:13px;transition:all 0.2s;}
    .toolbar button:hover{opacity:0.88;transform:scale(1.02)}
    .btn-toggle{background:#37474F;color:white;margin-bottom:5px;}
    .btn-area{background:#2196F3;color:white}
    .btn-obs{background:#f44336;color:white}
    .btn-drone{background:#FF9800;color:white}
    .btn-editar{background:#673AB7;color:white}
    .btn-gerar{background:#4CAF50;color:white;font-size:15px;padding:11px}
    .btn-desfazer{background:#9E9E9E;color:white}
    .btn-limpar{background:#607D8B;color:white}
    .btn-download{background:#9C27B0;color:white}
    .btn-gps{background:#00BCD4;color:white;}
    .btn-busca{background:#FFC107;color:#333;}
    .toolbar input[type=range]{width:100%}
    .toolbar hr{margin:2px 0;border:none;border-top:1px solid #eee}
    .lbl{font-size:12px;font-weight:600;color:#555}
    .row{display:flex;gap:5px}
    .row button{flex:1}
    .busca-container{display:flex;gap:5px;margin-bottom:5px;}
    .busca-container input{flex:1;padding:6px;border:1px solid #ccc;border-radius:4px;font-size:12px;}
    .status{position:absolute;bottom:20px;left:10px;background:rgba(0,0,0,0.72);color:white;padding:8px 16px;border-radius:25px;font-size:14px;z-index:1000;backdrop-filter:blur(5px);max-width:340px;}
    .area-info{position:absolute;background:rgba(255,255,255,0.9);padding:8px 14px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.18);z-index:900;text-align:center;pointer-events:auto;display:none;min-width:150px;cursor:move;border:1px solid rgba(0,0,0,0.1);}
    .area-info .ha{font-size:22px;font-weight:700;color:#1a6e1a}
    .area-info .nome{font-size:13px;color:#444;margin-top:2px;word-break:break-word}
    .legenda{position:absolute;bottom:20px;right:10px;background:rgba(255,255,255,0.92);padding:8px 12px;border-radius:8px;font-size:12px;z-index:1000;box-shadow:0 2px 5px rgba(0,0,0,0.18);}
    label{font-size:12px}
    input[type=text],input[type=number]{padding:5px;border:1px solid #ccc;border-radius:4px;font-size:13px;}
    .note{font-size:11px;color:#888;margin-top:2px;}
    .section-title{font-size:13px;font-weight:700;color:#333;margin-top:5px;margin-bottom:2px;}
    .loading-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      z-index: 2000;
      font-size: 14px;
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>
<div class="toolbar" id="toolbar">
  <button class="btn-toggle" id="btnToggleToolbar">🗕 Minimizar painel</button>
  
  <h3>🎮 Controle de Voo v8 - Suave</h3>
  
  <div class="section-title">🔍 Localização</div>
  <div class="busca-container">
    <input type="text" id="searchInput" placeholder="Endereço ou local...">
    <button class="btn-busca" id="btnBuscar">🔍</button>
  </div>
  <div class="row">
    <button class="btn-gps" id="btnGPS">📍 Minha Localização</button>
  </div>
  
  <hr>
  <div class="section-title">📋 Ações principais</div>
  <button class="btn-area" id="btnArea">📐 1. Mapear Área</button>
  <button class="btn-obs" id="btnObs">🌲 2. Adicionar Obstáculo</button>
  <button class="btn-drone" id="btnDrone">📍 3. Posicionar Drone</button>
  <button class="btn-editar" id="btnEditarPontos">🧷 4. Editar Pontos</button>
  
  <hr>
  <div class="row">
    <button class="btn-desfazer" id="btnDesfazer">↩️ Desfazer</button>
    <button class="btn-limpar" id="btnLimpar">🧹 Limpar</button>
  </div>
  
  <hr>
  <div class="section-title">⚙️ Rotas</div>
  <label>Ângulo: <input type="range" id="angulo" min="0" max="179" value="0"> <span id="anguloVal">0°</span></label>
  <label>Espaçamento (m): <input type="number" id="espacamento" value="5" min="1" max="500" style="width:70px"></label>
  <label>Cor da rota: <input type="color" id="cor" value="#00ff00"></label>
  
  <div class="section-title">🌲 Obstáculos</div>
  <label>Margem (m): <input type="number" id="margemObs" value="5" min="1" max="100" style="width:70px"></label>
  <label>Precisão amostragem (m): <input type="number" id="sampleStep" value="1.0" min="0.3" max="5" step="0.1" style="width:70px"></label>
  
  <div class="section-title">📍 Drone</div>
  <label>Tamanho: <input type="range" id="droneSize" min="3" max="20" value="8"></label>
  <label>Cor do drone: <input type="color" id="droneColor" value="#FF9800"></label>
  <label>Rotação (°): <input type="range" id="droneHeading" min="0" max="359" value="0"> <span id="headingVal">0°</span></label>
  <label>Conectar a cada N rotas: <input type="number" id="conexaoStep" value="1" min="1" max="200" style="width:70px"></label>
  
  <div class="section-title">📊 Informações</div>
  <label>Tamanho info (px): <input type="range" id="infoSize" min="14" max="48" value="22"> <span id="infoSizeVal">22px</span></label>
  <label>Nome da área:<br><input type="text" id="nomeArea" placeholder="Ex: Fazenda João" style="width:100%;margin-top:3px"></label>
  
  <hr>
  <button class="btn-gerar" id="btnGerar">✈️ GERAR ROTAS</button>
  <button class="btn-download" id="btnDownload">⬇️ Baixar KML</button>
</div>

<div class="area-info" id="areaInfo">
  <div class="ha" id="areaHa">0 ha</div>
  <div class="nome" id="areaNome"></div>
</div>
<div class="status" id="status">🎯 Pronto. Use a busca ou GPS para navegar.</div>
<div class="loading-indicator" id="loadingIndicator">⏳ Gerando rotas...</div>
<div class="legenda">
  <b>Legenda:</b><br>
  <span style="color:#2196F3">■</span> Área<br>
  <span style="color:#f44336">■</span> Obstáculos<br>
  <span style="color:#FF9800">✈️</span> Drone<br>
  <span style="color:#00ff00">━</span> Rotas
</div>
<div id="map"></div>

<script>
// --- Inicialização ---
var map = L.map('map', { doubleClickZoom: false }).setView([-22.33, -50.41], 18);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Esri'
}).addTo(map);

// --- Camadas ---
var areaLayer = new L.FeatureGroup().addTo(map);
var obstaculosLayer = new L.FeatureGroup().addTo(map);
var rotasLayer = L.layerGroup().addTo(map);
var extrasLayer = L.layerGroup().addTo(map);
var droneMarker = null;
var locationMarker = null;

// --- Estado ---
var historico = { areas: [], obstaculos: [] };
var drawAreaHandler = null, drawObsHandler = null;
var posicionandoDrone = false;
var editandoPontos = false;
var isGenerating = false;
var generateTimeout = null;

function setStatus(m) { 
  var el = document.getElementById('status');
  if (el) el.innerHTML = m; 
}

function showLoading(show) {
  var loader = document.getElementById('loadingIndicator');
  if (loader) loader.style.display = show ? 'block' : 'none';
}

// Debounce suave para o ângulo
function scheduleGenerate(delay = 300) {
  if (generateTimeout) clearTimeout(generateTimeout);
  generateTimeout = setTimeout(() => {
    if (areaLayer.getLayers().length > 0 && !isGenerating) {
      gerarRotas();
    }
  }, delay);
}

// ====================== MINIMIZAR PAINEL ======================
document.getElementById('btnToggleToolbar').onclick = function() {
  var toolbar = document.getElementById('toolbar');
  var isMin = toolbar.classList.toggle('minimized');
  this.textContent = isMin ? '🗖 Expandir painel' : '🗕 Minimizar painel';
};

// ====================== BUSCA ======================
document.getElementById('btnBuscar').onclick = function() {
  var query = document.getElementById('searchInput').value.trim();
  if (!query) return alert('Digite um endereço');
  setStatus('🔍 Buscando...');
  fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(query))
    .then(r => r.json())
    .then(data => {
      if (!data.length) return alert('Não encontrado');
      var lat = parseFloat(data[0].lat), lon = parseFloat(data[0].lon);
      map.setView([lat, lon], 18);
      if (locationMarker) map.removeLayer(locationMarker);
      locationMarker = L.marker([lat, lon]).addTo(map).bindPopup(data[0].display_name).openPopup();
      setStatus('📍 ' + data[0].display_name);
    });
};

// ====================== GPS ======================
document.getElementById('btnGPS').onclick = function() {
  if (!navigator.geolocation) return alert('GPS não suportado');
  setStatus('📍 Obtendo localização...');
  navigator.geolocation.getCurrentPosition(pos => {
    var lat = pos.coords.latitude, lng = pos.coords.longitude;
    map.setView([lat, lng], 18);
    if (locationMarker) map.removeLayer(locationMarker);
    locationMarker = L.circleMarker([lat, lng], { radius: 8, color: '#00BCD4', fillColor: '#00BCD4', fillOpacity: 0.5 }).addTo(map);
    setStatus('📍 Localização atualizada');
  }, () => setStatus('❌ Erro GPS'));
};

// ====================== DRONE ======================
function buildDronePlane(lat, lng, sizeDeg, headingDeg) {
  var pts = [[0,1.2],[0.35,0.3],[0.15,0.1],[0.3,-0.5],[0.1,-0.7],[0,-0.5],[-0.1,-0.7],[-0.3,-0.5],[-0.15,0.1],[-0.35,0.3]];
  var rad = headingDeg * Math.PI / 180, cos = Math.cos(rad), sin = Math.sin(rad);
  return pts.map(p => {
    var x = p[0] * sizeDeg, y = p[1] * sizeDeg;
    return [lat + (x * sin + y * cos), lng + (x * cos - y * sin)];
  });
}

function criarDrone(lat, lng) {
  if (droneMarker) map.removeLayer(droneMarker);
  var size = parseInt(document.getElementById('droneSize').value) || 8;
  var color = document.getElementById('droneColor').value;
  var heading = parseInt(document.getElementById('droneHeading').value) || 0;
  var pts = buildDronePlane(lat, lng, size / 100000, heading);
  droneMarker = L.polygon(pts, { color: color, fillColor: color, fillOpacity: 0.9, weight: 2 }).addTo(map);
  ativarDrag(droneMarker);
  setStatus('✅ Drone posicionado');
  if (rotasLayer.getLayers().length) scheduleGenerate(100);
}

function ativarDrag(poly) {
  var dragging = false, last;
  poly.on('mousedown', e => { dragging = true; last = e.latlng; map.dragging.disable(); });
  map.on('mousemove', e => {
    if (!dragging) return;
    var dLat = e.latlng.lat - last.lat, dLng = e.latlng.lng - last.lng;
    last = e.latlng;
    poly.setLatLngs(poly.getLatLngs()[0].map(p => [p.lat + dLat, p.lng + dLng]));
  });
  map.on('mouseup', () => { if (dragging) { dragging = false; map.dragging.enable(); scheduleGenerate(100); } });
}

// ====================== ÁREA INFO ======================
function atualizarInfoArea() {
  var layers = areaLayer.getLayers();
  if (!layers.length) return document.getElementById('areaInfo').style.display = 'none';
  var geo = layers[0].toGeoJSON();
  var ha = (turf.area(geo) / 10000).toFixed(2);
  var nome = document.getElementById('nomeArea').value.trim() || 'Área';
  document.getElementById('areaHa').textContent = ha + ' ha';
  document.getElementById('areaNome').textContent = nome;
  document.getElementById('areaInfo').style.display = 'block';
}

// ====================== BOTÕES PRINCIPAIS ======================
document.getElementById('btnArea').onclick = function() {
  if (drawObsHandler) drawObsHandler.disable();
  posicionandoDrone = false;
  if (editandoPontos && areaLayer.getLayers()[0]) {
    areaLayer.getLayers()[0].editing.disable();
    editandoPontos = false;
    document.getElementById('btnEditarPontos').textContent = '🧷 4. Editar Pontos';
  }
  drawAreaHandler = new L.Draw.Polygon(map, { shapeOptions: { color: '#2196F3', weight: 3, fillOpacity: 0.15 } });
  drawAreaHandler.enable();
  setStatus('✏️ Desenhe a área');
};

document.getElementById('btnObs').onclick = function() {
  if (!areaLayer.getLayers().length) return alert('Mapeie a área primeiro');
  if (drawAreaHandler) drawAreaHandler.disable();
  posicionandoDrone = false;
  drawObsHandler = new L.Draw.Polygon(map, { shapeOptions: { color: '#f44336', weight: 3, fillOpacity: 0.3 } });
  drawObsHandler.enable();
  setStatus('🌲 Desenhe obstáculo');
};

document.getElementById('btnDrone').onclick = function() {
  if (drawAreaHandler) drawAreaHandler.disable();
  if (drawObsHandler) drawObsHandler.disable();
  posicionandoDrone = true;
  map.getContainer().style.cursor = 'crosshair';
  setStatus('📍 Clique no mapa para o drone');
};

document.getElementById('btnEditarPontos').onclick = function() {
  if (!areaLayer.getLayers().length) return alert('Mapeie uma área primeiro');
  var area = areaLayer.getLayers()[0];
  if (!editandoPontos) {
    area.editing.enable();
    editandoPontos = true;
    this.textContent = '✅ Concluir edição';
    setStatus('✏️ Arraste os pontos para editar');
  } else {
    area.editing.disable();
    editandoPontos = false;
    this.textContent = '🧷 4. Editar Pontos';
    atualizarInfoArea();
    scheduleGenerate(100);
    setStatus('✅ Edição concluída');
  }
};

map.on('click', e => { if (posicionandoDrone) { criarDrone(e.latlng.lat, e.latlng.lng); posicionandoDrone = false; map.getContainer().style.cursor = ''; } });

map.on(L.Draw.Event.CREATED, e => {
  if (drawAreaHandler && drawAreaHandler.enabled()) {
    if (areaLayer.getLayers().length) historico.areas.push(areaLayer.getLayers()[0]);
    areaLayer.clearLayers();
    areaLayer.addLayer(e.layer);
    drawAreaHandler.disable();
    atualizarInfoArea();
    setStatus('✅ Área criada');
    scheduleGenerate(200);
  } else if (drawObsHandler && drawObsHandler.enabled()) {
    obstaculosLayer.addLayer(e.layer);
    historico.obstaculos.push(e.layer);
    drawObsHandler.disable();
    setStatus('✅ Obstáculo adicionado');
    scheduleGenerate(200);
  }
});

map.on(L.Draw.Event.EDITED, () => { atualizarInfoArea(); scheduleGenerate(200); });
map.on(L.Draw.Event.DELETED, () => { if (!areaLayer.getLayers().length) rotasLayer.clearLayers(); scheduleGenerate(200); });

document.getElementById('btnDesfazer').onclick = function() {
  if (historico.obstaculos.length) {
    var ultimo = historico.obstaculos.pop();
    obstaculosLayer.removeLayer(ultimo);
    scheduleGenerate(100);
  } else if (historico.areas.length) {
    areaLayer.clearLayers();
    areaLayer.addLayer(historico.areas.pop());
    atualizarInfoArea();
    scheduleGenerate(100);
  } else alert('Nada para desfazer');
};

document.getElementById('btnLimpar').onclick = function() {
  areaLayer.clearLayers();
  obstaculosLayer.clearLayers();
  rotasLayer.clearLayers();
  extrasLayer.clearLayers();
  if (droneMarker) map.removeLayer(droneMarker);
  droneMarker = null;
  historico = { areas: [], obstaculos: [] };
  document.getElementById('areaInfo').style.display = 'none';
  setStatus('🧹 Tudo limpo');
};

// ====================== CONTROLES COM DEBOUNCE SUAVE ======================
document.getElementById('angulo').oninput = function() {
  document.getElementById('anguloVal').innerText = this.value + '°';
  scheduleGenerate(400); // Delay maior para o ângulo
};

document.getElementById('espacamento').oninput = function() { scheduleGenerate(300); };
document.getElementById('margemObs').oninput = function() { scheduleGenerate(300); };
document.getElementById('sampleStep').oninput = function() { scheduleGenerate(300); };
document.getElementById('conexaoStep').oninput = function() { if (rotasLayer.getLayers().length) scheduleGenerate(200); };
document.getElementById('cor').oninput = function() { if (rotasLayer.getLayers().length) scheduleGenerate(100); };
document.getElementById('droneColor').oninput = function() { if (droneMarker) { var c = droneMarker.getBounds().getCenter(); criarDrone(c.lat, c.lng); } };
document.getElementById('droneHeading').oninput = function() { 
  document.getElementById('headingVal').innerText = this.value + '°';
  if (droneMarker) { var c = droneMarker.getBounds().getCenter(); criarDrone(c.lat, c.lng); }
};
document.getElementById('droneSize').oninput = function() { if (droneMarker) { var c = droneMarker.getBounds().getCenter(); criarDrone(c.lat, c.lng); } };
document.getElementById('infoSize').oninput = function() { document.getElementById('areaHa').style.fontSize = this.value + 'px'; };

// ====================== GERAÇÃO OTIMIZADA DE ROTAS ======================
function pointIsValid(coord, areaGeo, obstacleBuffers) {
  var pt = turf.point(coord);
  if (!turf.booleanPointInPolygon(pt, areaGeo)) return false;
  for (var i = 0; i < obstacleBuffers.length; i++) {
    if (turf.booleanPointInPolygon(pt, obstacleBuffers[i])) return false;
  }
  return true;
}

function segmentLineByValidity(line, areaGeo, obstacleBuffers, sampleStepMeters) {
  var chunks = [], current = [];
  var totalKm = turf.length(line, { units: 'kilometers' });
  if (totalKm === 0) return chunks;
  var stepKm = sampleStepMeters / 1000;
  
  for (var d = 0; d <= totalKm + 1e-9; d += stepKm) {
    var coord = turf.along(line, Math.min(d, totalKm), { units: 'kilometers' }).geometry.coordinates;
    if (pointIsValid(coord, areaGeo, obstacleBuffers)) {
      current.push(coord);
    } else {
      if (current.length >= 2) chunks.push(turf.lineString(current));
      current = [];
    }
  }
  if (current.length >= 2) chunks.push(turf.lineString(current));
  return chunks;
}

function gerarRotas() {
  if (isGenerating) return;
  isGenerating = true;
  showLoading(true);
  
  // Usar setTimeout para não travar a UI
  setTimeout(() => {
    try {
      rotasLayer.clearLayers();
      extrasLayer.clearLayers();
      
      if (!areaLayer.getLayers().length) {
        isGenerating = false;
        showLoading(false);
        return;
      }
      
      var areaGeo = areaLayer.getLayers()[0].toGeoJSON();
      var obstaculosGeo = [];
      obstaculosLayer.eachLayer(l => obstaculosGeo.push(l.toGeoJSON()));
      
      var cor = document.getElementById('cor').value;
      var angulo = parseFloat(document.getElementById('angulo').value);
      var espacamento = parseFloat(document.getElementById('espacamento').value) || 5;
      var margemObs = parseFloat(document.getElementById('margemObs').value) || 5;
      var conexaoStep = parseInt(document.getElementById('conexaoStep').value) || 1;
      var sampleStepMeters = parseFloat(document.getElementById('sampleStep').value) || 1.0;
      
      // Buffers dos obstáculos
      var obstacleBuffers = [];
      obstaculosGeo.forEach(obs => {
        try {
          var b = turf.buffer(obs, margemObs, { units: 'meters', steps: 24 });
          if (b) obstacleBuffers.push(b);
        } catch(e) {}
      });
      
      var bbox = turf.bbox(areaGeo);
      var centro = turf.center(areaGeo).geometry.coordinates;
      var espacamentoGraus = espacamento / 111320;
      
      var minX = bbox[0] - espacamentoGraus;
      var maxX = bbox[2] + espacamentoGraus;
      var minY = bbox[1] - espacamentoGraus;
      var maxY = bbox[3] + espacamentoGraus;
      
      var routeCount = 0;
      
      // Gerar linhas
      for (var y = minY; y <= maxY; y += espacamentoGraus) {
        var linha = turf.lineString([[minX, y], [maxX, y]]);
        if (angulo !== 0) {
          linha = turf.transformRotate(linha, angulo, { pivot: centro });
        }
        
        var segments = segmentLineByValidity(linha, areaGeo, obstacleBuffers, sampleStepMeters);
        
        segments.forEach(seg => {
          var coords = seg.geometry.coordinates;
          if (coords && coords.length >= 2) {
            var latlngs = coords.map(c => [c[1], c[0]]);
            L.polyline(latlngs, { color: cor, weight: 2.5, opacity: 0.9 }).addTo(rotasLayer);
            routeCount++;
          }
        });
      }
      
      // Conexões do drone
      if (droneMarker && routeCount > 0) {
        var droneCenter = droneMarker.getBounds().getCenter();
        var droneColor = document.getElementById('droneColor').value;
        var connIndex = 0;
        
        rotasLayer.eachLayer(layer => {
          if (connIndex % conexaoStep === 0 && layer.getLatLngs && layer.getLatLngs().length) {
            var start = layer.getLatLngs()[0];
            L.polyline([[droneCenter.lat, droneCenter.lng], [start.lat, start.lng]], {
              color: droneColor, weight: 1.5, dashArray: '6,6', opacity: 0.85
            }).addTo(extrasLayer);
          }
          connIndex++;
        });
      }
      
      setStatus(`✈️ ${routeCount} rotas geradas | Ângulo: ${angulo}°`);
    } catch (err) {
      console.error(err);
      setStatus('❌ Erro ao gerar rotas');
    } finally {
      isGenerating = false;
      showLoading(false);
    }
  }, 50);
}

document.getElementById('btnGerar').onclick = function() {
  if (!areaLayer.getLayers().length) return alert('Mapeie uma área primeiro');
  gerarRotas();
};

// Download KML
document.getElementById('btnDownload').onclick = function() {
  if (!rotasLayer.getLayers().length) return alert('Gere as rotas primeiro');
  var nome = document.getElementById('nomeArea').value.trim() || 'Área';
  var kml = '<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>' + nome + '</name>';
  
  areaLayer.eachLayer(l => {
    var pts = l.getLatLngs()[0];
    var coords = pts.map(p => p.lng + ',' + p.lat + ',0').join(' ') + ' ' + pts[0].lng + ',' + pts[0].lat + ',0';
    kml += `<Placemark><name>Área</name><Polygon><outerBoundaryIs><LinearRing><coordinates>${coords}</coordinates></LinearRing></outerBoundaryIs></Polygon></Placemark>`;
  });
  
  var idx = 1;
  rotasLayer.eachLayer(l => {
    if (l.getLatLngs && l.getLatLngs().length) {
      var coords = l.getLatLngs().map(p => p.lng + ',' + p.lat + ',0').join(' ');
      kml += `<Placemark><name>Rota ${idx++}</name><LineString><coordinates>${coords}</coordinates></LineString></Placemark>`;
    }
  });
  
  kml += '</Document></kml>';
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' }));
  a.download = 'drone-rotas.kml';
  a.click();
  setStatus('✅ KML baixado');
};
